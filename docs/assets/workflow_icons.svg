<svg width="1400" height="920" viewBox="0 0 1400 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Workflow-first adaptive loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eaf3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#a5b9d0" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a7590"/>
    </marker>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)"/>

  <text x="700" y="52" text-anchor="middle" font-family="Segoe UI, Arial" font-size="34" font-weight="700" fill="#123f73">Adaptive Workflow Control (What EDAgent Actually Does)</text>
  <text x="700" y="80" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#4f6f8d">Not global skill search: classify workflow first, then choose next skill, then learn from feedback</text>

  <!-- Main loop blocks -->
  <g filter="url(#shadow)">
    <rect x="70" y="140" width="230" height="110" rx="16" fill="#1f5ca8"/>
    <rect x="340" y="140" width="260" height="110" rx="16" fill="#00897b"/>
    <rect x="640" y="140" width="250" height="110" rx="16" fill="#7b1fa2"/>
    <rect x="930" y="140" width="220" height="110" rx="16" fill="#d07a00"/>
    <rect x="1190" y="140" width="170" height="110" rx="16" fill="#455a64"/>

    <rect x="930" y="300" width="220" height="110" rx="16" fill="#00695c"/>
    <rect x="640" y="300" width="250" height="110" rx="16" fill="#5e35b1"/>
    <rect x="340" y="300" width="260" height="110" rx="16" fill="#1565c0"/>
  </g>

  <text x="185" y="178" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">User Task</text>
  <text x="185" y="204" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#dbe9ff">Natural language request</text>

  <text x="470" y="178" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">Workflow Judge</text>
  <text x="470" y="204" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#dbfff9">bugfix/refactor/experiment/...</text>

  <text x="765" y="178" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">Skill Selector</text>
  <text x="765" y="204" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#f0ddff">choose within workflow subset</text>

  <text x="1040" y="178" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">Execution</text>
  <text x="1040" y="204" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#fff0dd">skill + EDA tools</text>

  <text x="1275" y="178" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">Result</text>
  <text x="1275" y="204" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#e4eef6">metrics/artifacts</text>

  <text x="1040" y="338" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">User Feedback</text>
  <text x="1040" y="364" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#d7fff7">preference + requirement</text>

  <text x="765" y="338" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">Skill Evolution</text>
  <text x="765" y="364" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#eaddff">update/create skill + SOP</text>

  <text x="470" y="338" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" font-weight="700" fill="#fff">Memory Update</text>
  <text x="470" y="364" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ddeaff">persist habit + policy + KB</text>

  <!-- Arrows -->
  <line x1="300" y1="195" x2="340" y2="195" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="195" x2="640" y2="195" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="890" y1="195" x2="930" y2="195" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1150" y1="195" x2="1190" y2="195" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="1275" y1="250" x2="1100" y2="300" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="930" y1="355" x2="890" y2="355" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="355" x2="600" y2="355" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M340,355 C180,355 160,250 190,250" fill="none" stroke="#5a7590" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Workflow icon cards -->
  <text x="700" y="492" text-anchor="middle" font-family="Segoe UI, Arial" font-size="30" font-weight="700" fill="#123f73">Workflow Classes (Agent Decides This First)</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#123f73">
    <rect x="70" y="530" width="240" height="86" rx="14" fill="#ffffff"/><text x="95" y="580">Bug Fix</text>
    <rect x="330" y="530" width="240" height="86" rx="14" fill="#ffffff"/><text x="355" y="580">Repo Analysis</text>
    <rect x="590" y="530" width="240" height="86" rx="14" fill="#ffffff"/><text x="615" y="580">Feature Add</text>
    <rect x="850" y="530" width="240" height="86" rx="14" fill="#ffffff"/><text x="875" y="580">Refactor</text>
    <rect x="1110" y="530" width="220" height="86" rx="14" fill="#ffffff"/><text x="1135" y="580">Env/Debug</text>

    <rect x="70" y="640" width="300" height="86" rx="14" fill="#ffffff"/><text x="95" y="690">EDA Experiment Orchestration</text>
    <rect x="390" y="640" width="300" height="86" rx="14" fill="#ffffff"/><text x="415" y="690">Infra Evolution</text>
    <rect x="710" y="640" width="300" height="86" rx="14" fill="#ffffff"/><text x="735" y="690">Reporting / Slides</text>
    <rect x="1030" y="640" width="300" height="86" rx="14" fill="#ffffff"/><text x="1055" y="690">Onboarding</text>
  </g>

  <rect x="70" y="760" width="1260" height="120" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="95" y="798" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#123f73">Scalability Contract</text>
  <text x="95" y="828" font-family="Segoe UI, Arial" font-size="16" fill="#31526f">1) User never handles skill names/params/order.</text>
  <text x="95" y="852" font-family="Segoe UI, Arial" font-size="16" fill="#31526f">2) Agent handles workflow decision and next-step routing only.</text>
  <text x="95" y="876" font-family="Segoe UI, Arial" font-size="16" fill="#31526f">3) Tools stay inside skills; feedback is persisted into skills/SOP so the system gets smoother over time.</text>
</svg>
